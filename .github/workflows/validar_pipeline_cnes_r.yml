name: validar-pipeline-cnes-r

on:
  push:
    branches:
      - main
      - work
      - feature/**
      - feat/**
      - test/**
      - metadata/**
    paths:
      - 'src/**'
      - 'tests/**'
      - 'metadata/**'
      - 'config/dependencias_r.csv'
      - 'scripts/instalar_dependencias_r.R'
      - '.github/workflows/validar_pipeline_cnes_r.yml'
      - 'docs/cnes/**'
      - 'docs/fluxo_trabalho.md'
  pull_request:
    paths:
      - 'src/**'
      - 'tests/**'
      - 'metadata/**'
      - 'config/dependencias_r.csv'
      - 'scripts/instalar_dependencias_r.R'
      - '.github/workflows/validar_pipeline_cnes_r.yml'
      - 'docs/cnes/**'
      - 'docs/fluxo_trabalho.md'

jobs:
  teste-cnes-r:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.3'

      - name: Verificar R e Rscript
        run: |
          which R
          which Rscript
          R --version
          Rscript --version

      - name: Exibir sessão R
        run: Rscript -e 'sessionInfo()'

      - name: Preparar dependências do pipeline
        run: Rscript scripts/instalar_dependencias_r.R

      - name: Executar teste estrutural do repositório
        run: Rscript tests/test_estrutura_repositorio.R

      - name: Executar teste de metadados CNES
        run: Rscript tests/test_metadata_cnes.R

      - name: Executar teste de leitura CNES
        run: Rscript tests/test_ler_arquivos_cnes.R

      - name: Executar teste de padronização CNES
        run: Rscript tests/test_padronizar_cnes_interim.R

      - name: Executar teste de validação CNES
        run: Rscript tests/test_validar_pipeline_cnes.R

      - name: Executar teste de orquestração CNES
        run: Rscript tests/test_executar_pipeline_piloto_cnes.R

      - name: Executar teste de integração CNES
        run: Rscript tests/teste_pipeline_piloto_cnes.R

      - name: Executar teste de indicadores de oferta CNES
        run: Rscript tests/test_indicadores_cnes_oferta.R
